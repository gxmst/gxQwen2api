services:
  gx-qwen-api:
    build: .

    ports:
      - "${HOST_ADDRESS:-0.0.0.0}:${HOST_PORT:-31998}:${PORT:-31998}"

    # We recommend using a named volume for credentials to ensure reliable 
    # write permissions across different OS environments.
    # NOTE: If you are upgrading from an older version using ~/.qwen,
    # see the "Migration" section in README.md to avoid losing accounts.
    volumes:
      - qwen_creds:/app/data/creds
      # For advanced bind-mount setup (be careful with permissions!):
      # - ~/.qwen:/app/data/creds

    environment:
      - PORT=${PORT:-31998}
      - ADDRESS=${ADDRESS:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_RETRIES=${MAX_RETRIES:-5}
      - RETRY_DELAY_MS=${RETRY_DELAY_MS:-1000}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_AUTH_USE:-true}
      - API_KEY=${API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-coder-model}
      - LOG_REQUESTS=${LOG_REQUESTS:-true}
      - CREDS_DIR=/app/data/creds
      - ADMIN_ENABLED=${ADMIN_ENABLED:-true}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

    restart: unless-stopped

volumes:
  qwen_creds:
