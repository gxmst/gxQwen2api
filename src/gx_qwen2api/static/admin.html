<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gxQwen2api — Admin</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --yellow: #d29922; --red: #f85149;
  --orange: #db6d28;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 16px; }
h1 { font-size: 1.25rem; margin-bottom: 8px; color: var(--accent); }
h2 { font-size: 1rem; margin: 16px 0 8px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
a { color: var(--accent); }
.container { max-width: 1100px; margin: 0 auto; }

/* Top bar */
.topbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.topbar button { cursor: pointer; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
.badge-ok { background: #23863622; color: var(--green); border: 1px solid #23863666; }
.badge-warn { background: #d2992222; color: var(--yellow); border: 1px solid #d2992266; }
.badge-err { background: #f8514922; color: var(--red); border: 1px solid #f8514966; }
.badge-info { background: #1f6feb22; color: var(--accent); border: 1px solid #1f6feb66; }

/* Account cards */
.accounts { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; position: relative; }
.card.disabled { opacity: 0.5; }
.card h3 { font-size: 0.95rem; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.card .meta { font-size: 0.8rem; color: var(--muted); }
.card .meta span { margin-right: 10px; }
.card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.78rem; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: var(--border); }
.btn-sm { padding: 2px 8px; font-size: 0.72rem; }
.btn-green { border-color: #23863666; color: var(--green); }
.btn-green:hover { background: #23863633; }
.btn-red { border-color: #f8514966; color: var(--red); }
.btn-red:hover { background: #f8514933; }
.btn-blue { border-color: #1f6feb66; color: var(--accent); }
.btn-blue:hover { background: #1f6feb33; }

/* Logs */
.logs-box { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; max-height: 420px; overflow-y: auto; padding: 8px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; }
.log-entry { padding: 3px 0; border-bottom: 1px solid #21262d; word-break: break-all; }
.log-entry:last-child { border-bottom: none; }
.log-ts { color: var(--muted); }
.log-event { font-weight: 600; }
.log-acct { color: var(--accent); }
.log-detail { color: var(--text); }

/* Status dot */
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.dot-green { background: var(--green); }
.dot-yellow { background: var(--yellow); }
.dot-red { background: var(--red); }
.dot-gray { background: var(--muted); }

/* Health bar */
.health-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.health-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; min-width: 120px; text-align: center; }
.health-item .val { font-size: 1.4rem; font-weight: 700; }
.health-item .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; }

/* Refresh interval */
.auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); }
.auto-refresh select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; }

/* Modal for errors */
.error-detail { font-size: 0.75rem; color: var(--red); margin-top: 4px; word-break: break-all; max-height: 60px; overflow: hidden; }
</style>
</head>
<body>
<div class="container">
  <h1>gxQwen2api — Dashboard</h1>

  <div class="topbar">
    <button class="btn btn-blue" onclick="loadAccounts()">Refresh Now</button>
    <button class="btn" onclick="loadLogs()">Refresh Logs</button>
    <button class="btn btn-green" onclick="doAction('/admin/api/scan', 'Scanned')">Scan Creds Dir</button>
    <button class="btn" onclick="doAction('/admin/api/reload-all', 'Reloaded all')">Reload All</button>
    <button class="btn btn-blue" onclick="document.getElementById('credFile').click()">Upload Credential</button>
    <input type="file" id="credFile" accept=".json" style="display:none" onchange="uploadCredential()">
    <button class="btn btn-red btn-sm" onclick="doAction('/admin/api/logs/clear', 'Cleared')">Clear Logs</button>
    <div class="auto-refresh">
      Auto-refresh:
      <select id="interval" onchange="toggleAuto()">
        <option value="0">Off</option>
        <option value="5000">5s</option>
        <option value="15000" selected>15s</option>
        <option value="30000">30s</option>
        <option value="60000">60s</option>
      </select>
    </div>
  </div>

  <div class="health-bar" id="healthBar">
    <div class="health-item"><div class="val" id="hTotal">-</div><div class="label">Accounts</div></div>
    <div class="health-item"><div class="val" id="hHealthy">-</div><div class="label">Healthy</div></div>
    <div class="health-item"><div class="val" id="hRequests">-</div><div class="label">Requests</div></div>
    <div class="health-item"><div class="val" id="hUptime">-</div><div class="label">Uptime</div></div>
  </div>

  <h2>Accounts</h2>
  <div class="accounts" id="accounts">
    <div style="color:var(--muted)">Loading...</div>
  </div>

  <h2>Recent Events <span id="logCount" style="font-size:0.75rem;color:var(--muted)"></span></h2>
  <div class="logs-box" id="logsBox">
    <div style="color:var(--muted)">Loading logs...</div>
  </div>
</div>

<script>
const API = '';

// Auto-redirect to login when 403
const origFetch = window.fetch;
window.fetch = async function (...args) {
  const res = await origFetch.apply(this, args);
  if (res.status === 403 && res.url.includes('/admin/api/')) {
    window.location.href = '/admin/login';
  }
  return res;
};

function fmtTs(epochMs) {
  if (!epochMs) return '-';
  const d = new Date(epochMs);
  return d.toLocaleString();
}

function fmtDuration(sec) {
  if (sec < 60) return Math.floor(sec) + 's';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function statusBadge(status) {
  const map = {
    valid: '<span class="badge badge-ok">Valid</span>',
    healthy: '<span class="badge badge-ok">Valid</span>',
    expiring_soon: '<span class="badge badge-warn">Expiring Soon</span>',
    expired: '<span class="badge badge-err">Expired</span>',
    no_token: '<span class="badge badge-warn">No Token</span>',
    unknown: '<span class="badge badge-info">Unknown</span>',
  };
  return map[status] || `<span class="badge badge-info">${status}</span>`;
}

function dot(status) {
  if (status === 'valid' || status === 'healthy') return '<span class="dot dot-green"></span>';
  if (status === 'expiring_soon') return '<span class="dot dot-yellow"></span>';
  if (status === 'expired' || status === 'no_token') return '<span class="dot dot-red"></span>';
  return '<span class="dot dot-gray"></span>';
}

async function loadAccounts() {
  const [accRes, logsRes] = await Promise.all([
    fetch(API + '/admin/api/accounts'),
    fetch(API + '/admin/api/logs?limit=100'),
  ]);
  const accounts = await accRes.json();
  const logs = await logsRes.json();
  renderAccounts(accounts);
  renderLogs(logs);
}

function renderAccounts(accounts) {
  const el = document.getElementById('accounts');
  if (!accounts.length) { el.innerHTML = '<div style="color:var(--muted)">No accounts found. Make sure JSON files exist in the creds directory.</div>'; return; }

  // Update health bar
  const healthy = accounts.filter(a => a.enabled && (a.token_status === 'valid' || a.token_status === 'healthy')).length;
  document.getElementById('hTotal').textContent = accounts.length;
  document.getElementById('hHealthy').textContent = healthy;

  el.innerHTML = accounts.map(a => {
    const enabledClass = a.enabled ? '' : 'disabled';
    const tokenExpiry = a.expires_in_minutes != null ? `${Math.max(0, a.expires_in_minutes).toFixed(1)} min left` : '-';
    const cooldownBadge = a.in_cooldown ? '<span class="badge badge-err">Cooldown</span>' : '';
    const errDetail = a.last_error ? `<div class="error-detail">${escHtml(a.last_error)}</div>` : '';
    return `
      <div class="card ${enabledClass}">
        <h3>
          <span>${dot(a.token_status)}${escHtml(a.account_id)}</span>
          <span>${a.enabled ? '<span class="badge badge-ok">Enabled</span>' : '<span class="badge badge-err">Disabled</span>'}</span>
        </h3>
        <div class="meta">
          <span>Token: ${statusBadge(a.token_status)}</span>
          <span>${cooldownBadge}</span><br>
          <span>Expires: ${tokenExpiry}</span>
          <span>Requests: ${a.requests_count}</span><br>
          <span>File: ${escHtml(a.creds_file)}</span><br>
          <span>Last refresh: ${a.last_refresh || '-'}</span>
          <span>Errors: ${a.error_count}</span>
          ${errDetail}
        </div>
        <div class="card-actions">
          ${a.enabled
            ? `<button class="btn btn-sm btn-red" onclick="doAccount('disable','${escAttr(a.account_id)}')">Disable</button>`
            : `<button class="btn btn-sm btn-green" onclick="doAccount('enable','${escAttr(a.account_id)}')">Enable</button>`}
          <button class="btn btn-sm btn-blue" onclick="doAccount('refresh','${escAttr(a.account_id)}')">Force Refresh</button>
          <button class="btn btn-sm" onclick="doAccount('reload','${escAttr(a.account_id)}')">Reload File</button>
        </div>
      </div>`;
  }).join('');
}

function renderLogs(logs) {
  const el = document.getElementById('logsBox');
  document.getElementById('logCount').textContent = `(${logs.length} entries)`;
  if (!logs.length) { el.innerHTML = '<div style="color:var(--muted)">No events yet.</div>'; return; }
  const eventColors = {
    request: 'var(--accent)', response: 'var(--green)', error: 'var(--red)',
    refresh_start: 'var(--yellow)', refresh_ok: 'var(--green)', refresh_fail: 'var(--red)',
    server: 'var(--muted)',
  };
  el.innerHTML = logs.reverse().map(l => {
    const color = eventColors[l.event] || 'var(--text)';
    return `<div class="log-entry">
      <span class="log-ts">${l.ts}</span>
      <span class="log-event" style="color:${color}">${escHtml(l.event)}</span>
      ${l.account_id ? `<span class="log-acct">[${escHtml(l.account_id)}]</span>` : ''}
      <span class="log-detail">${escHtml(l.detail || '')}</span>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function doAccount(action, accountId) {
  const endpoints = {
    enable: `/admin/api/enable/${accountId}`,
    disable: `/admin/api/disable/${accountId}`,
    refresh: `/admin/api/refresh/${accountId}`,
    reload: `/admin/api/reload?account_id=${accountId}`,
  };
  await doAction(endpoints[action], `${action} ${accountId}`);
}

async function doAction(url, label) {
  try {
    const res = await fetch(url, { method: 'POST' });
    const data = await res.json();
    showToast(`${label} — ${data.status || 'ok'}`);
    await loadAccounts();
  } catch (e) {
    showToast(`${label} — error: ${e.message}`, true);
  }
}

async function uploadCredential() {
  const input = document.getElementById('credFile');
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(API + '/admin/api/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    showToast(`Uploaded: ${data.account_id} (${data.action})`);
    await loadAccounts();
  } catch (e) {
    showToast(`Upload error: ${e.message}`, true);
  }
}

function showToast(msg, isError) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t);
    Object.assign(t.style, { position:'fixed', bottom:'20px', right:'20px', padding:'10px 18px', borderRadius:'8px', background:'var(--surface)', border:'1px solid var(--border)', color:'var(--text)', fontSize:'0.85rem', zIndex:'999', transition:'opacity 0.3s', maxWidth:'400px' }); }
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// Auto-refresh
let autoTimer = null;
function toggleAuto() {
  const ms = parseInt(document.getElementById('interval').value);
  if (autoTimer) clearInterval(autoTimer);
  if (ms > 0) autoTimer = setInterval(loadAccounts, ms);
}

// Initial load
loadAccounts();
toggleAuto();
</script>
</body>
</html>
